<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/companylogo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Echo International Medica — AI-powered cross-border biotech advisory. Strategy, partnerships, and capital solutions for life sciences companies entering Greater China." />

    <!-- Performance: Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Lexend (headings) + Source Sans 3 (body) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

    <script>
      // Reduce CLS from font swaps: reveal after fonts are ready
      if ('fonts' in document) {
        document.fonts.ready.then(function(){
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>

    <title>Echo International Medica</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
